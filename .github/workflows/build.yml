name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r macro_app/requirements.txt

      - name: Build EXE
        run: |
           pyinstaller --noconsole --onefile --clean --name MacroStudio --paths . --collect-submodules macro_app macro_app/main.py
           
      - name: Upload EXE
        uses: actions/upload-artifact@v4
        with:
          name: MacroStudio-Windows
          path: dist/MacroStudio.exe
